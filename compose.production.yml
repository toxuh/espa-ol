name: espanol-diario

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-espanol_diario}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5444/${POSTGRES_DB:-espanol_diario}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-espanol_diario}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5444/${POSTGRES_DB:-espanol_diario}?schema=public
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Madrid}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8888}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
      - ingress
    restart: unless-stopped

  db:
    image: postgres:16-bookworm
    command: ["postgres", "-p", "5444"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-espanol_diario}
      POSTGRES_USER: ${POSTGRES_USER:-espanol_diario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p 5444",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  internal:
    internal: true
  ingress:
    driver: bridge
