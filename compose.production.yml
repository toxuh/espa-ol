name: espanol-diario

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-espanol_diario}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-espanol_diario}?schema=public
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Madrid}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.espanol-diario.rule=Host(`${TRAEFIK_HOST:?TRAEFIK_HOST is required}`)
      - traefik.http.routers.espanol-diario.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.espanol-diario.tls=true
      - traefik.http.routers.espanol-diario.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.services.espanol-diario.loadbalancer.server.port=3000
    networks:
      - internal
      - traefik
    restart: unless-stopped

  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-espanol_diario}
      POSTGRES_USER: ${POSTGRES_USER:-espanol_diario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  internal:
    internal: true
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:?TRAEFIK_NETWORK is required}
